<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#f6c343">
<title>ひまわり</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
<style>
:root{--ink:#2d2412;--muted:#756844;--line:#e2d7ad;--paper:#fffdf5;--panel:#fff8db;--sun:#f6c343;--sun-deep:#d89b12;--leaf:#587a34;--leaf-soft:#eef5df;--danger:#b54b36;--shadow:0 18px 45px rgb(100 80 20/.13);font-family:Inter,"Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP",system-ui,sans-serif;color:var(--ink);background:var(--paper)}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#fff9d8 0,#fffdf5 280px),var(--paper)}body.has-modal{overflow:hidden}button,input{font:inherit}button{cursor:pointer}h1,h2,p{margin:0}.app{min-height:100dvh;padding:18px;display:flex;flex-direction:column;gap:16px}.top{display:grid;grid-template-columns:minmax(210px,1fr) minmax(280px,420px) auto;gap:16px;align-items:center;border:1px solid var(--line);border-radius:8px;background:rgb(255 253 245/.9);box-shadow:var(--shadow);padding:14px 16px}.brand{display:flex;align-items:center;gap:13px;min-width:0}.mark{width:40px;height:40px;border:6px solid var(--sun);border-radius:50%;background:#6d5220;box-shadow:0 0 0 4px #fff2a9 inset;flex:0 0 auto;position:relative}.mark:before,.mark:after{content:"";position:absolute;left:50%;top:50%;width:55px;height:8px;border-radius:999px;background:var(--sun);transform:translate(-50%,-50%);z-index:-1}.mark:after{transform:translate(-50%,-50%) rotate(90deg)}.brand h1{font-size:25px;font-weight:850;line-height:1.05}.brand p{margin-top:3px;color:var(--muted);font-size:13px;font-weight:700}.search{display:grid;gap:6px;color:var(--muted);font-size:12px;font-weight:800}.search input,.form input{width:100%;height:42px;border:1px solid var(--line);border-radius:8px;background:#fffef9;color:var(--ink);outline:0;padding:11px 12px;text-align:left}.search input:focus,.form input:focus{border-color:var(--sun-deep);box-shadow:0 0 0 3px rgb(246 195 67/.24)}.add,.primary,.secondary,.delete,.edit{min-height:38px;border-radius:8px;font-weight:850}.add,.primary{border:0;background:var(--sun);color:var(--ink);padding:0 18px}.add{min-width:82px}.lists{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;min-height:calc(100dvh - 112px)}.col{display:flex;flex-direction:column;min-width:0;overflow:hidden;border:1px solid var(--line);border-radius:8px;background:rgb(255 253 245/.94);box-shadow:var(--shadow)}.col header{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);background:var(--panel);padding:15px 16px 13px}.col h2{font-size:19px;line-height:1}.count{border-radius:999px;background:var(--leaf-soft);color:var(--leaf);font-size:12px;font-weight:850;padding:4px 9px}.store-list{display:grid;align-content:start;gap:8px;overflow-y:auto;padding:12px}.row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;align-items:center;border:1px solid transparent;border-radius:8px;background:#fffef9;padding:9px 9px 9px 12px}.row:hover,.row:focus-within{border-color:var(--sun-deep);background:#fff6ce}.store{display:grid;gap:3px;min-width:0;border:0;background:transparent;color:inherit;text-align:left;padding:0}.store strong{overflow-wrap:anywhere;font-size:clamp(16px,1.2vw,20px);font-weight:850;line-height:1.28}.store span{color:var(--muted);font-size:13px;font-weight:700}.edit{min-width:42px;min-height:30px;border:1px solid var(--line);background:#fffdf5;color:var(--muted);font-size:12px;padding:0 8px}.empty{color:var(--muted);font-weight:700;text-align:center;padding:32px 8px}.backdrop{position:fixed;inset:0;z-index:20;display:grid;place-items:center;overflow-y:auto;background:rgb(45 36 18/.52);padding:18px}.modal{position:relative;width:min(100%,520px);border:1px solid var(--line);border-radius:8px;background:var(--paper);box-shadow:0 25px 90px rgb(45 36 18/.28);padding:22px}.modal.qr{width:min(100%,580px)}.close{position:absolute;right:12px;top:12px;width:36px;height:36px;display:grid;place-items:center;border:1px solid var(--line);border-radius:8px;background:#fffdf5;color:var(--muted);font-size:24px;line-height:1}.qr-meta{display:grid;gap:7px;padding-right:42px}.tag{width:max-content;border-radius:999px;background:var(--leaf-soft);color:var(--leaf);font-size:13px;font-weight:850;padding:5px 10px}.qr-meta h2{overflow-wrap:anywhere;font-size:clamp(28px,5vw,44px);font-weight:900;line-height:1.12}.qr-meta p{color:var(--muted);font-size:20px;font-weight:800}.qrbox{display:grid;place-items:center;width:100%;aspect-ratio:1;margin-top:18px;border:1px solid var(--line);border-radius:8px;background:#fffdf5;padding:15px}.qrbox canvas{width:min(100%,420px)!important;height:auto!important;image-rendering:pixelated}.heading{display:flex;justify-content:space-between;align-items:baseline;gap:12px;margin-bottom:16px;padding-right:42px}.heading h2{font-size:22px}.heading p{color:var(--muted);font-size:12px;font-weight:800}.form{display:grid;gap:14px}.form label{display:grid;gap:7px;color:var(--muted);font-size:13px;font-weight:800}fieldset{min-width:0;margin:0;padding:0;border:0}legend{margin-bottom:8px;color:var(--muted);font-size:13px;font-weight:800}.seg{display:grid;grid-template-columns:repeat(3,1fr);overflow:hidden;border:1px solid var(--line);border-radius:8px;background:#fffef9}.seg label{display:block;position:relative}.seg input{position:absolute;inset:0;width:100%;height:100%;margin:0;opacity:0}.seg span{display:block;text-align:center;color:var(--ink);padding:12px 0}.seg label:not(:last-child) span{border-right:1px solid var(--line)}.seg input:checked+span{background:var(--leaf);color:#fffef9;font-weight:900}.actions{display:grid;grid-template-columns:auto auto 1fr;gap:8px;justify-content:end}.secondary{border:1px solid var(--line);background:#fffef9;color:var(--ink);padding:0 14px}.delete{border:1px solid #edc7bd;background:#fff4ef;color:var(--danger);font-size:13px;padding:0 12px}@media(max-width:780px){.app{gap:12px;padding:10px}.top{grid-template-columns:1fr auto;gap:10px;padding:12px}.brand{grid-column:1/-1}.brand h1{font-size:23px}.add{min-width:72px;padding:0 14px}.lists{grid-template-columns:repeat(3,minmax(220px,1fr));min-height:calc(100dvh - 137px);overflow-x:auto;padding-bottom:6px;scroll-snap-type:x proximity}.col{scroll-snap-align:start}.store-list{padding:10px}.store strong{font-size:17px}.backdrop{align-items:start;padding:10px}.modal{margin-top:18px;padding:18px}.actions{grid-template-columns:1fr 1fr}.delete{grid-column:1/-1}}
</style>
</head>
<body><div id="app"></div><script>
const KEY='himawari.contacts.v1';
const PREFS=['愛知','三重','岐阜'];
const SEED=[{id:'softbank-nagoya',name:'ソフトバンク名古屋',phone:'052-957-8050',prefecture:'愛知'}];
let contacts=load(), query='', modal=null;
const app=document.querySelector('#app');
function load(){try{const saved=JSON.parse(localStorage.getItem(KEY)||'null'); if(Array.isArray(saved)&&saved.length)return saved;}catch{localStorage.removeItem(KEY)} localStorage.setItem(KEY,JSON.stringify(SEED)); return SEED;}
function save(){localStorage.setItem(KEY,JSON.stringify(contacts));}
function h(v){return String(v).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;');}
function esc(v){return String(v).replaceAll('\\','\\\\').replaceAll(';','\\;').replaceAll(',','\\,').replaceAll('\n','\\n');}
function vcard(c){const n=esc(c.name),p=esc(c.phone),pref=esc(c.prefecture);return ['BEGIN:VCARD','VERSION:3.0',`N:${n};.;;;`,`FN:${n}`,`TEL;TYPE=WORK,VOICE:${p}`,`CATEGORIES:${pref}`,'END:VCARD'].join('\n');}
function byId(id){return contacts.find(c=>c.id===id)||null;}
function rows(pref){const q=query.trim().toLowerCase();return contacts.filter(c=>c.prefecture===pref).filter(c=>c.name.trim().toLowerCase().includes(q)).sort((a,b)=>a.name.localeCompare(b.name,'ja'));}
function render(){app.innerHTML=`<main class="app"><header class="top"><div class="brand"><span class="mark" aria-hidden="true"></span><div><h1>ひまわり</h1><p>電話帳登録QR</p></div></div><label class="search"><span>名前検索</span><input id="search" type="search" placeholder="店舗名を入力" autocomplete="off"></label><button class="add" id="add" type="button">追加</button></header><section class="lists" aria-label="店舗一覧"></section><div id="modal"></div></main>`;const s=document.querySelector('#search');s.value=query;s.addEventListener('input',e=>{query=e.target.value;renderLists();});document.querySelector('#add').addEventListener('click',()=>openForm());renderLists();renderModal();}
function renderLists(){document.querySelector('.lists').innerHTML=PREFS.map(pref=>{const r=rows(pref);return `<section class="col" aria-label="${pref}の店舗"><header><h2>${pref}</h2><span class="count">${r.length}件</span></header><div class="store-list">${r.length?r.map(row).join(''):'<p class="empty">該当店舗なし</p>'}</div></section>`}).join('');document.querySelectorAll('[data-qr]').forEach(b=>b.addEventListener('click',()=>openQr(b.dataset.qr)));document.querySelectorAll('[data-edit]').forEach(b=>b.addEventListener('click',()=>openForm(b.dataset.edit)));}
function row(c){return `<article class="row"><button class="store" type="button" data-qr="${c.id}"><strong>${h(c.name)}</strong><span>${h(c.phone)}</span></button><button class="edit" type="button" data-edit="${c.id}" aria-label="${h(c.name)}を編集">編集</button></article>`;}
function openQr(id){if(!byId(id))return; modal={type:'qr',id}; renderModal();}
function openForm(id=null){modal={type:'form',id}; renderModal();}
function closeModal(){modal=null; renderModal();}
function renderModal(){const root=document.querySelector('#modal');document.body.classList.toggle('has-modal',!!modal);if(!modal){root.innerHTML='';return;}const c=modal.id?byId(modal.id):null;root.innerHTML=`<div class="backdrop"><section class="modal ${modal.type==='qr'?'qr':''}" role="dialog" aria-modal="true" aria-labelledby="title"><button class="close" id="close" type="button" aria-label="閉じる">×</button>${modal.type==='qr'&&c?qrHtml(c):formHtml(c)}</section></div>`;document.querySelector('#close').addEventListener('click',closeModal);document.querySelector('.backdrop').addEventListener('click',e=>{if(e.target.classList.contains('backdrop'))closeModal();}); if(modal.type==='qr'&&c)drawQr(c); else bindForm(c);}
function qrHtml(c){return `<div class="qr-meta"><span class="tag">${h(c.prefecture)}</span><h2 id="title">${h(c.name)}</h2><p>${h(c.phone)}</p></div><div class="qrbox"><canvas id="qr" width="420" height="420" aria-label="${h(c.name)}の電話帳登録QRコード"></canvas></div>`;}
function formHtml(c){const edit=!!c,pref=c?.prefecture||'愛知';return `<div class="heading"><h2 id="title">${edit?'店舗を編集':'店舗を追加'}</h2><p>${contacts.length}件登録中</p></div><form id="form" class="form"><label><span>店舗名</span><input id="name" name="name" required autocomplete="organization" placeholder="例: ソフトバンク名古屋" value="${h(c?.name||'')}"></label><label><span>電話番号</span><input name="phone" required inputmode="tel" autocomplete="tel" placeholder="例: 052-957-8050" value="${h(c?.phone||'')}"></label><fieldset><legend>タグ</legend><div class="seg">${PREFS.map(p=>`<label><input type="radio" name="prefecture" value="${p}" ${p===pref?'checked':''}><span>${p}</span></label>`).join('')}</div></fieldset><div class="actions">${edit?'<button class="delete" id="delete" type="button">削除</button>':''}<button class="secondary" id="cancel" type="button">キャンセル</button><button class="primary" type="submit">${edit?'保存':'追加'}</button></div></form>`;}
function bindForm(c){document.querySelector('#form').addEventListener('submit',e=>{e.preventDefault();const f=new FormData(e.currentTarget),name=String(f.get('name')||'').trim(),phone=String(f.get('phone')||'').trim(),pref=String(f.get('prefecture')||'愛知');if(!name||!phone||!PREFS.includes(pref))return;if(c)contacts=contacts.map(x=>x.id===c.id?{...x,name,phone,prefecture:pref}:x);else contacts=[...contacts,{id:crypto.randomUUID(),name,phone,prefecture:pref}];save();closeModal();renderLists();});document.querySelector('#cancel').addEventListener('click',closeModal);document.querySelector('#delete')?.addEventListener('click',()=>{if(c&&confirm(`${c.name}を削除しますか？`)){contacts=contacts.filter(x=>x.id!==c.id);save();closeModal();renderLists();}});requestAnimationFrame(()=>document.querySelector('#name')?.focus());}
async function drawQr(c){const el=document.querySelector('#qr'); await QRCode.toCanvas(el,vcard(c),{width:420,margin:2,errorCorrectionLevel:'M',color:{dark:'#2d2412',light:'#fffdf5'}});}
render();
</script></body></html>
