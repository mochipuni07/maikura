name: Sync Himawari bundle

on:
  push:
    paths:
      - .github/workflows/sync-himawari.yml

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download self-contained app
        run: curl -fsSL https://files.catbox.moe/nkcpj7.html -o index.html
      - name: Commit app bundle
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Fix QR rendering in deployed app"
          git push